services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: afolio-app

    working_dir: /var/www

    volumes:
      - ./:/var/www

  nginx:
    image: nginx:latest

    container_name: afolio-nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:
    image: mysql:8

    container_name: afolio-mysql

    environment:
      MYSQL_DATABASE: afolio
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: